[tox]
envlist = {py39,py310,py311,py312,py313,py314}-sphinx{5,6,7,8,9},docs
isolated_build = True

[testenv]
setenv =
    PYTHONPATH = {toxinidir}:{toxinidir}/rstcloth
commands =
    coverage run --source rstcloth -m pytest
    coverage report --show-missing
    coverage xml
deps =
    pytest
    coverage
    pytest-cov
    sphinx5: sphinx>=5,<6
    sphinx6: sphinx>=6,<7
    sphinx7: sphinx>=7,<8
    sphinx8: sphinx>=8,<9
    sphinx9: sphinx>=9,<10

[testenv:docs]
whitelist_externals = rm
deps =
    sphinx>=5,<6
    sphinx-rtd-theme==1.0.0
    sphinx-tabs==3.3.1
    docutils>=0.14
commands =
    rm -rf docs/doctrees
    rm -rf docs/html
    sphinx-build -b html -d docs/doctrees docs/source docs/html

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

