
[tox]
# Exclude py310-sphinx9 as Sphinx 9 is not supported on Python 3.10
envlist = docs,
           py310-sphinx5,py310-sphinx6,py310-sphinx7,py310-sphinx8,
           py311-sphinx5,py311-sphinx6,py311-sphinx7,py311-sphinx8,py311-sphinx9,
           py312-sphinx5,py312-sphinx6,py312-sphinx7,py312-sphinx8,py312-sphinx9,
           py313-sphinx5,py313-sphinx6,py313-sphinx7,py313-sphinx8,py313-sphinx9,
           py314-sphinx5,py314-sphinx6,py314-sphinx7,py314-sphinx8,py314-sphinx9
isolated_build = True

[testenv]
setenv =
    PYTHONPATH = {toxinidir}:{toxinidir}/rstcloth
commands =
    coverage run --source rstcloth -m pytest
    coverage report --show-missing
    coverage xml
deps =
    pytest
    coverage
    pytest-cov
    sphinx5: sphinx>=5,<6
    sphinx6: sphinx>=6,<7
    sphinx7: sphinx>=7,<8
    sphinx8: sphinx>=8,<9
    sphinx9: sphinx>=9,<10

[testenv:docs]
whitelist_externals = rm
deps =
    sphinx>=5,<6
    sphinx-rtd-theme>=1.0.0
    sphinx-tabs>=3.3.1
    docutils>=0.14
commands =
    rm -rf docs/doctrees
    rm -rf docs/html
    sphinx-build -b html -d docs/doctrees docs/source docs/html

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

